name: 检查微信更新并自动提取 Hook 配置

on:
  # 定时检查：每天 UTC 2:00（北京时间 10:00）
  schedule:
    - cron: '0 2 * * *'
  # 也支持手动触发
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check-and-extract:
    name: 检查更新并自动提取
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v7

      - name: 抓取微信更新页面并提取 APK 链接
        id: scrape
        shell: python
        run: |
          import os, re, urllib.request, html

          PAGE_URL = "https://weixin.qq.com/updates?platform=android"
          print(f"抓取页面: {PAGE_URL}")

          req = urllib.request.Request(
            PAGE_URL,
            headers={"User-Agent": "Mozilla/5.0 (compatible; GitHubActions/1.0)"},
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
            page_html = resp.read().decode("utf-8", errors="replace")

          # 解码 HTML 实体（如 &amp;）
          page_html = html.unescape(page_html)

          # === 提取所有 .apk 下载链接 ===
          apk_urls = re.findall(r'https://[^"\'<> ]+\.apk', page_html)

          if not apk_urls:
            print("::error::未找到任何 APK 下载链接")
            exit(1)

          # 优先选择 arm64 版本
          arm64_urls = [u for u in apk_urls if "arm64" in u]
          if arm64_urls:
            apk_url = arm64_urls[0]
            print(f"找到 64 位 APK: {apk_url}")
          else:
            apk_url = apk_urls[0]
            print(f"找到 APK（32位）: {apk_url}")

          # 输出 APK 链接
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"apk_url={apk_url}\n")

          # === 提取版本号 ===
          version = ""

          # 方式1：从页面文本找 "Android X.Y.Z"
          m = re.search(r'Android\D*(\d+\.\d+\.\d+)', page_html)
          if m:
            version = m.group(1)

          # 方式2：从 APK 文件名提取
          if not version:
            m = re.search(r'(\d+\.\d+\.\d+)', apk_url)
            if m:
              version = m.group(1)

          if version:
            print(f"识别版本号: {version}")
          else:
            print("未识别到版本号，将由提取脚本自动检测")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"version={version}\n")

      - name: 检查链接是否与上次提取过的一致
        id: check
        shell: bash
        run: |
          LAST_URL=""
          if [ -f ".last_apk_url" ]; then
            LAST_URL=$(cat .last_apk_url)
            echo "上次已成功提取的链接: $LAST_URL"
          else
            echo "首次运行，无历史记录"
          fi

          CURRENT_URL="${{ steps.scrape.outputs.apk_url }}"
          echo "当前最新链接: $CURRENT_URL"

          if [ "$LAST_URL" = "$CURRENT_URL" ]; then
            echo "链接与上次提取过的相同，说明无新版本，跳过"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "检测到新版本 APK 链接！"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 触发 Hook 配置提取并等待完成
        if: steps.check.outputs.changed == 'true'
        id: trigger
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          APK_URL="${{ steps.scrape.outputs.apk_url }}"
          VERSION="${{ steps.scrape.outputs.version }}"

          echo "========================================"
          echo "  触发 Hook 配置提取"
          echo "  APK: $APK_URL"
          [ -n "$VERSION" ] && echo "  版本: $VERSION"
          echo "========================================"

          ARGS="-f apk_url=$APK_URL"
          [ -n "$VERSION" ] && ARGS="$ARGS -f version=$VERSION"

          # 触发下游工作流，获取 run ID
          RUN_ID=$(gh workflow run "提取微信 Hook 配置" \
            --ref master \
            $ARGS \
            --json id \
            -q '.id')

          echo "触发完成，Run ID: $RUN_ID"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

          # 等待下游工作流完成（最多等 30 分钟）
          echo "等待提取工作流完成..."
          if gh run watch "$RUN_ID" --exit-status --interval 30 2>&1; then
            CONCLUSION=$(gh run view "$RUN_ID" --json conclusion -q '.conclusion')
            echo "提取工作流完成，结论: $CONCLUSION"
            echo "conclusion=$CONCLUSION" >> "$GITHUB_OUTPUT"
          else
            CONCLUSION=$(gh run view "$RUN_ID" --json conclusion -q '.conclusion')
            echo "提取工作流未通过，结论: $CONCLUSION"
            echo "conclusion=$CONCLUSION" >> "$GITHUB_OUTPUT"
          fi

      - name: 提取成功后更新链接记录
        if: steps.trigger.outputs.conclusion == 'success'
        shell: bash
        run: |
          CURRENT_URL="${{ steps.scrape.outputs.apk_url }}"

          # 写入记录文件
          echo "$CURRENT_URL" > .last_apk_url

          # 提交到仓库
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .last_apk_url
          VERSION="${{ steps.scrape.outputs.version }}"
          MSG="chore: update last APK link"
          [ -n "$VERSION" ] && MSG="$MSG (WeChat $VERSION)"
          git commit -m "$MSG [skip ci]"
          git push

          echo "已成功更新 .last_apk_url 记录"

      - name: 提取失败告警
        if: steps.trigger.outputs.conclusion != '' && steps.trigger.outputs.conclusion != 'success'
        shell: bash
        run: |
          echo "::warning::提取工作流未成功完成（结论: ${{ steps.trigger.outputs.conclusion }}）"
          echo "::warning::链接未标记为已处理，下次定时检查将重试"
          echo "::warning::APK 链接: ${{ steps.scrape.outputs.apk_url }}"
