name: 检查微信更新并自动提取 Hook 配置

on:
  # 定时检查：每天 UTC 2:00（北京时间 10:00）
  schedule:
    - cron: '0 2 * * *'
  # 也支持手动触发
  workflow_dispatch:
    inputs:
      run_extract:
        description: '是否执行提取工作流（默认提取，可手动关闭）'
        type: boolean
        required: false
        default: true

permissions:
  contents: write
  actions: write

jobs:
  check-and-extract:
    name: 检查更新并自动提取
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v7

      - name: 抓取微信更新页面并提取 APK 链接
        id: scrape
        shell: bash
        run: |
          set -e

          # 备选 URL 列表（按优先级排序）
          PAGE_URLS=(
            "https://weixin.qq.com/updates?platform=android"
          )

          mkdir -p /tmp/wxscrape
          PAGE_FILE="/tmp/wxscrape/page.html"
          FOUND=false

          for url in "${PAGE_URLS[@]}"; do
            echo "尝试抓取: $url"
            if curl -sL --max-time 15 --retry 3 --retry-delay 5 \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -o "$PAGE_FILE" \
              "$url" 2>/dev/null; then
              if [ -s "$PAGE_FILE" ]; then
                echo "成功获取页面: $url"
                FOUND=true
                break
              fi
            fi
            echo "页面 $url 不可达，尝试下一个..."
          done

          if [ "$FOUND" = false ]; then
            echo "::error::所有备选页面均不可达，跳过本轮检查"
            echo "apk_url=" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 用 Python 解析 HTML 提取 APK 链接和版本号
          python3 << 'PYEOF'
          import os, re, html

          with open("/tmp/wxscrape/page.html", "r", encoding="utf-8", errors="replace") as f:
              page = f.read()

          page = html.unescape(page)

          # 提取所有 .apk 下载链接
          apk_urls = re.findall(r'https://[^"\'> ]+\.apk', page)

          if not apk_urls:
              # 尝试从其他 URL 格式提取
              apk_urls = re.findall(r'https://[^"\'> ]*wechat[^"\'> ]*\.apk', page, re.I)

          if not apk_urls:
              print("::warning::未找到 APK 链接，将尝试用最新已知版本")
              apk_url = ""
          else:
              # 优先 arm64
              arm64_urls = [u for u in apk_urls if "arm64" in u]
              apk_url = arm64_urls[0] if arm64_urls else apk_urls[0]
              print(f"APK: {apk_url}")

          # 提取版本号
          version = ""
          m = re.search(r'Android\D*(\d+\.\d+\.\d+)', page)
          if m:
              version = m.group(1)
          if not version and apk_url:
              m = re.search(r'(\d+\.\d+\.\d+)', apk_url)
              if m:
                  version = m.group(1)

          print(f"版本号: {version if version else '未知'}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"apk_url={apk_url}\n")
              f.write(f"version={version}\n")
          PYEOF

      - name: 检查链接是否与上次提取过的一致
        id: check
        shell: bash
        run: |
          LAST_URL=""
          if [ -f ".last_apk_url" ]; then
            LAST_URL=$(cat .last_apk_url)
            echo "上次已成功提取的链接: $LAST_URL"
          else
            echo "首次运行，无历史记录"
          fi

          CURRENT_URL="${{ steps.scrape.outputs.apk_url }}"
          echo "当前最新链接: $CURRENT_URL"

          if [ "$LAST_URL" = "$CURRENT_URL" ]; then
            echo "链接与上次提取过的相同，说明无新版本，跳过"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "检测到新版本 APK 链接！"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 触发 Hook 配置提取并等待完成
        if: steps.check.outputs.changed == 'true' && (github.event_name != 'workflow_dispatch' || inputs.run_extract == true)
        id: trigger
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -e -o pipefail

          APK_URL="${{ steps.scrape.outputs.apk_url }}"
          VERSION="${{ steps.scrape.outputs.version }}"

          echo "========================================"
          echo "  触发 Hook 配置提取"
          echo "  APK: $APK_URL"
          [ -n "$VERSION" ] && echo "  版本: $VERSION"
          echo "========================================"

          ARGS="-f apk_url=$APK_URL"
          [ -n "$VERSION" ] && ARGS="$ARGS -f version=$VERSION"

          # 触发下游工作流，保存原始输出（不依赖 --json / --jq）
          RUN_OUTPUT=$(gh workflow run "提取微信 Hook 配置" \
            --ref master \
            $ARGS 2>&1)
          echo "gh 输出: $RUN_OUTPUT"

          # 从输出文本中提取 run ID（兼容中英文输出）
          RUN_ID=$(echo "$RUN_OUTPUT" | grep -oP '\d{7,}' | head -1)
          if [ -z "$RUN_ID" ]; then
            echo "::error::无法解析 Run ID，触发可能失败"
            exit 1
          fi

          echo "触发完成，Run ID: $RUN_ID"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

          # 等待下游工作流完成（最多等 30 分钟）
          echo "等待提取工作流完成..."
          set +e
          gh run watch "$RUN_ID" --exit-status --interval 30 2>&1
          WATCH_EXIT=$?
          set -e

          if [ $WATCH_EXIT -eq 0 ]; then
            CONCLUSION="success"
          else
            # 尝试多种方式获取结论（兼容新版旧版 gh）
            CONCLUSION=$(gh run view "$RUN_ID" 2>/dev/null | grep -oiE '(success|failure|cancelled|skipped)' | head -1 || echo "")
            if [ -z "$CONCLUSION" ]; then
              CONCLUSION=$(gh run view "$RUN_ID" --json conclusion 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['conclusion'])" 2>/dev/null || echo "failure")
            fi
            echo "提取工作流未通过，结论: $CONCLUSION"
          fi
          echo "conclusion=$CONCLUSION" >> "$GITHUB_OUTPUT"

      - name: 提取成功后更新链接记录
        if: steps.trigger.outputs.conclusion == 'success'
        shell: bash
        run: |
          CURRENT_URL="${{ steps.scrape.outputs.apk_url }}"

          # 写入记录文件
          echo "$CURRENT_URL" > .last_apk_url

          # 提交到仓库
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .last_apk_url
          VERSION="${{ steps.scrape.outputs.version }}"
          MSG="chore: update last APK link"
          [ -n "$VERSION" ] && MSG="$MSG (WeChat $VERSION)"
          git commit -m "$MSG [skip ci]"
          git push

          echo "已成功更新 .last_apk_url 记录"

      - name: 提取失败告警
        if: steps.trigger.outputs.conclusion != '' && steps.trigger.outputs.conclusion != 'success'
        shell: bash
        run: |
          echo "::warning::提取工作流未成功完成（结论: ${{ steps.trigger.outputs.conclusion }}）"
          echo "::warning::链接未标记为已处理，下次定时检查将重试"
          echo "::warning::APK 链接: ${{ steps.scrape.outputs.apk_url }}"
