name: 提取微信 Hook 配置
displayName: 提取 Hook 配置

trigger:
  - push

pipeline:
  - stage:
      name: extract
      displayName: 提取配置
      agent:
        type: linux
        image: eclipse-temurin:17-jdk
      steps:
        - name: checkout
          uses: actions/checkout@v1

        - name: 安装依赖
          run: |
            apt-get update -qq
            apt-get install -y -qq python3 python3-pip aapt

        - name: 下载 APK
          run: |
            mkdir -p apk_input
            if [ -n "${APK_URL}" ]; then
              curl -L -o apk_input/wechat.apk "${APK_URL}"
            fi

        - name: 提取配置
          run: |
            chmod +x scripts/extract_hook_config.py
            python3 scripts/extract_hook_config.py apk_input/wechat.apk \
              --detect-version \
              --fast \
              --ci \
              --output config/hook_config_$(date +%s).json

        - name: 上传结果
          uses: actions/upload-artifact@v1
          with:
            name: hook-config
            path: config/hook_config_*.json
